<nav class="navbar" [class.scrolled]="scrolled">
  <div class="container navbar__inner">
    <!-- RIGHT SIDE (on mobile) -->
    <div class="nav-right">
      <a routerLink="/" class="navbar__logo" (click)="closeMenu()">
        <span class="navbar__brand">
          {{ langService.currentLang() === 'ar' ? 'تسويقار' : 'Tasweeqar' }}
        </span>
        <div class="navbar__logo-box">
          <img src="/images/logo.png" alt="Tasweeqar Logo" />
        </div>
      </a>
    </div>

    <!-- ── Visual separator: logo ↔ links ───────────────────────── -->
    <div class="navbar__sep" aria-hidden="true"></div>

    <!-- ── Nav links ─────────────────────────────────────────────── -->
    <ul class="navbar__links mobile-menu" [class.open]="menuOpen()">
      <li class="mobile-only-lang">
        <button class="lang-btn-menu" (click)="langService.toggle()">
          <i class="fa-solid fa-globe"></i>
          {{ langService.currentLang() === 'ar' ? 'EN / English' : 'العربية / AR' }}
        </button>
      </li>
      <li>
        <a
          routerLink="/"
          routerLinkActive="nav-active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
          >{{ 'nav.home' | translate }}</a
        >
      </li>
      <li>
        <a routerLink="/projects" routerLinkActive="nav-active" (click)="closeMenu()">{{
          'nav.projects' | translate
        }}</a>
      </li>
      <li>
        <a routerLink="/services" routerLinkActive="nav-active" (click)="closeMenu()">{{
          'nav.services' | translate
        }}</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="nav-active" (click)="closeMenu()">{{
          'nav.about' | translate
        }}</a>
      </li>
      <li>
        <a
          routerLink="/contact"
          routerLinkActive="nav-active"
          class="navbar__cta"
          (click)="closeMenu()"
          >{{ 'nav.contact' | translate }}</a
        >
      </li>
    </ul>

    <!-- LEFT SIDE (on mobile) -->
    <div class="nav-left navbar__actions">
      <button class="navbar__toggle-btn lang-btn" (click)="langService.toggle()">
        <i class="fa-solid fa-globe"></i>
        {{ langService.currentLang() === 'ar' ? 'EN' : 'AR' }}
      </button>
      <button class="navbar__hamburger hamburger" (click)="toggleMenu()">
        @if (!menuOpen()) {
          <i class="fa-solid fa-bars"></i>
        } @else {
          <i class="fa-solid fa-xmark"></i>
        }
      </button>
      <button class="navbar__toggle-btn mode-toggle" (click)="themeService.toggle()">
        @if (themeService.isDark()) {
          <i class="fa-solid fa-sun"></i>
        } @else {
          <i class="fa-solid fa-moon"></i>
        }
      </button>
    </div>
  </div>
</nav>
